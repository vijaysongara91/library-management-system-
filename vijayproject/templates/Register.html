<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1" name="viewport" />
  <title>Library Management System - Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
    rel="stylesheet"
  />
  <style>
    body {
          background: url("https://wallpaper-house.com/data/out/8/wallpaper2you_231931.jpg") no-repeat center center fixed;
      font-family: "Inter", sans-serif;
      background-color: #f9fafb;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .register-container {
      background-color: #ffffff;
      border-radius: 0.5rem;
      box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1),
        0 4px 6px -4px rgb(0 0 0 / 0.1);
      max-width: 400px;
      width: 100%;
      padding: 2rem;
    }
    h1 {
      font-weight: 600;
      font-size: 1.875rem;
      color: #1f2937;
      margin-bottom: 1.5rem;
      text-align: center;
    }
    label {
      display: block;
      font-weight: 600;
      color: #374151;
      margin-bottom: 0.25rem;
    }
    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border: 1px solid #d1d5db;
      border-radius: 0.375rem;
      font-size: 1rem;
      color: #111827;
      transition: border-color 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
    }
    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgb(59 130 246 / 0.3);
    }
    .error-message {
      color: #dc2626;
      font-size: 0.875rem;
      margin-top: 0.25rem;
      display: none;
    }
    button[type="submit"] {
      width: 100%;
      background-color: #3b82f6;
      color: white;
      font-weight: 600;
      padding: 0.5rem 0;
      border: none;
      border-radius: 0.375rem;
      font-size: 1.125rem;
      cursor: pointer;
      transition: background-color 0.2s ease-in-out;
      margin-top: 1rem;
    }
    button[type="submit"]:hover {
      background-color: #2563eb;
    }
    .login-link {
      margin-top: 1rem;
      text-align: center;
      font-size: 0.875rem;
      color: #6b7280;
    }
    .login-link a {
      color: #3b82f6;
      text-decoration: none;
      font-weight: 600;
    }
    .login-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="register-container">
    <h1>Create Your Account</h1>
    <form action="Register" id="registerForm" novalidate method="post">
      {%csrf_token%}
    <div>
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="johndoe123"
          required
        />
        <p class="error-message" id="usernameError">Please enter a username.</p>
      </div>

       <div>
        <label for="username">First Name</label>
        <input
          type="text"
          id="username"
          name="fname"
          placeholder="johndoe123"
          required
        />
        <p class="error-message" id="usernameError">Please enter a first name.</p>
      </div>


       <div>
        <label for="username">Last name</label>
        <input
          type="text"
          id="username"
          name="lname"
          placeholder="johndoe123"
          required
        />
        <p class="error-message" id="usernameError">Please enter a last name .</p>
      </div>

      <div>
        <label for="email">Email Address</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="john@example.com"
          required
        />
        <p class="error-message" id="emailError">Please enter a valid email address.</p>
      </div>
     
      <div>
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="********"
          required
          minlength="6"
        />
        <p class="error-message" id="passwordError">Password must be at least 6 characters.</p>
      </div>
    
      <button type="submit">Register</button>
    </form>
    <p class="login">
      Already have an account?
      <a href="login">login</a>
    </p>
  </div>

</body>
</html>
