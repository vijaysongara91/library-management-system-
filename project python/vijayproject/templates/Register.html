<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1" name="viewport" />
  <title>Library Management System - Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
    rel="stylesheet"
  />
  <style>
    body {
      font-family: "Inter", sans-serif;
      background-color: #f9fafb;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .register-container {
      background-color: #ffffff;
      border-radius: 0.5rem;
      box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1),
        0 4px 6px -4px rgb(0 0 0 / 0.1);
      max-width: 400px;
      width: 100%;
      padding: 2rem;
    }
    h1 {
      font-weight: 600;
      font-size: 1.875rem;
      color: #1f2937;
      margin-bottom: 1.5rem;
      text-align: center;
    }
    label {
      display: block;
      font-weight: 600;
      color: #374151;
      margin-bottom: 0.25rem;
    }
    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border: 1px solid #d1d5db;
      border-radius: 0.375rem;
      font-size: 1rem;
      color: #111827;
      transition: border-color 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
    }
    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgb(59 130 246 / 0.3);
    }
    .error-message {
      color: #dc2626;
      font-size: 0.875rem;
      margin-top: 0.25rem;
      display: none;
    }
    button[type="submit"] {
      width: 100%;
      background-color: #3b82f6;
      color: white;
      font-weight: 600;
      padding: 0.5rem 0;
      border: none;
      border-radius: 0.375rem;
      font-size: 1.125rem;
      cursor: pointer;
      transition: background-color 0.2s ease-in-out;
      margin-top: 1rem;
    }
    button[type="submit"]:hover {
      background-color: #2563eb;
    }
    .login-link {
      margin-top: 1rem;
      text-align: center;
      font-size: 0.875rem;
      color: #6b7280;
    }
    .login-link a {
      color: #3b82f6;
      text-decoration: none;
      font-weight: 600;
    }
    .login-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="register-container">
    <h1>Create Your Account</h1>
    <form id="registerForm" novalidate>
      <div>
        <label for="fullName">Full Name</label>
        <input
          type="text"
          id="fullName"
          name="fullName"
          placeholder="John Doe"
          required
        />
        <p class="error-message" id="fullNameError">Please enter your full name.</p>
      </div>
      <div>
        <label for="email">Email Address</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="john@example.com"
          required
        />
        <p class="error-message" id="emailError">Please enter a valid email address.</p>
      </div>
      <div>
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="johndoe123"
          required
        />
        <p class="error-message" id="usernameError">Please enter a username.</p>
      </div>
      <div>
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="********"
          required
          minlength="6"
        />
        <p class="error-message" id="passwordError">Password must be at least 6 characters.</p>
      </div>
      <div>
        <label for="confirmPassword">Confirm Password</label>
        <input
          type="password"
          id="confirmPassword"
          name="confirmPassword"
          placeholder="********"
          required
          minlength="6"
        />
        <p class="error-message" id="confirmPasswordError">Passwords do not match.</p>
      </div>
      <button type="submit">Register</button>
    </form>
    <p class="login">
      Already have an account?
      <a href="login">login</a>
    </p>
  </div>

  <script>
    const form = document.getElementById("registerForm");
    const fullName = document.getElementById("fullName");
    const email = document.getElementById("email");
    const username = document.getElementById("username");
    const password = document.getElementById("password");
    const confirmPassword = document.getElementById("confirmPassword");

    const fullNameError = document.getElementById("fullNameError");
    const emailError = document.getElementById("emailError");
    const usernameError = document.getElementById("usernameError");
    const passwordError = document.getElementById("passwordError");
    const confirmPasswordError = document.getElementById("confirmPasswordError");

    function validateEmail(email) {
      const re =
        /^(([^<>()\[\]\\.,;:\s@"]+(\.[^<>()\[\]\\.,;:\s@"]+)*)|(".+"))@(([^<>()[\]\\.,;:\s@"]+\.)+[^<>()[\]\\.,;:\s@"]{2,})$/i;
      return re.test(String(email).toLowerCase());
    }

    form.addEventListener("submit", (e) => {
      e.preventDefault();

      let valid = true;

      // Full Name validation
      if (fullName.value.trim() === "") {
        fullNameError.style.display = "block";
        valid = false;
      } else {
        fullNameError.style.display = "none";
      }

      // Email validation
      if (!validateEmail(email.value.trim())) {
        emailError.style.display = "block";
        valid = false;
      } else {
        emailError.style.display = "none";
      }

      // Username validation
      if (username.value.trim() === "") {
        usernameError.style.display = "block";
        valid = false;
      } else {
        usernameError.style.display = "none";
      }

      // Password validation
      if (password.value.length < 6) {
        passwordError.style.display = "block";
        valid = false;
      } else {
        passwordError.style.display = "none";
      }

      // Confirm Password validation
      if (confirmPassword.value !== password.value || confirmPassword.value.length < 6) {
        confirmPasswordError.style.display = "block";
        valid = false;
      } else {
        confirmPasswordError.style.display = "none";
      }

      if (valid) {
        alert("Registration successful!");
        form.reset();
      }
    });
  </script>
</body>
</html>
