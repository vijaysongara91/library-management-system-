<html lang="en">
 <head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1" name="viewport" />
  <title>Library Management System - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&amp;display=swap" rel="stylesheet" />
  <style>
   body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 1rem;
  }
  .card {
    background: white;
    border-radius: 1rem;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
    max-width: 400px;
    width: 100%;
    padding: 2.5rem 2rem;
  }
  .input-field {
    border: 2px solid #e5e7eb;
    border-radius: 0.5rem;
    padding: 0.75rem 1rem;
    font-size: 1rem;
    width: 100%;
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
  }
  .input-field:focus {
    outline: none;
    border-color: #7c3aed;
    box-shadow: 0 0 8px #a78bfa;
    background-color: #fafafa;
  }
  .error-message {
    color: #dc2626;
    font-size: 0.875rem;
    margin-top: 0.25rem;
  }
  </style>
 </head>
 <body>
  <main class="card">
   <h1 class="text-3xl font-semibold text-gray-800 mb-6 text-center">Library Login</h1>
   <form id="loginForm" novalidate>
    <div class="mb-5">
     <label for="username" class="block text-gray-700 font-medium mb-2">Username or Email</label>
     <input
      type="text"
      id="username"
      name="username"
      placeholder="Enter your username or email"
      class="input-field"
      autocomplete="username"
      required
     />
     <p class="error-message hidden" id="usernameError">Please enter your username or email.</p>
    </div>
    <div class="mb-5">
     <label for="password" class="block text-gray-700 font-medium mb-2">Password</label>
     <input
      type="password"
      id="password"
      name="password"
      placeholder="Enter your password"
      class="input-field"
      autocomplete="current-password"
      required
      minlength="6"
     />
     <p class="error-message hidden" id="passwordError">Please enter a password (min 6 characters).</p>
    </div>
    <button
     type="submit"
     class="w-full bg-purple-700 hover:bg-purple-800 text-white font-semibold py-3 rounded-lg transition"
    >
     Log In
    </button>
   </form>
   <div class="mt-6 text-center text-gray-600 text-sm space-y-2">
    <p>
     <a href="#" class="text-purple-600 hover:underline">Forgot password?</a>
    </p>
    <p>
     Don't have an account?
     <a href="Register" class="Register">Register here</a>
    </p>
   </div>
  </main>

  <script>
   const loginForm = document.getElementById('loginForm');
   const usernameInput = document.getElementById('username');
   const passwordInput = document.getElementById('password');
   const usernameError = document.getElementById('usernameError');
   const passwordError = document.getElementById('passwordError');

   loginForm.addEventListener('submit', function (e) {
     e.preventDefault();

     let valid = true;

     // Reset errors
     usernameError.classList.add('hidden');
     passwordError.classList.add('hidden');

     // Validate username/email
     if (!usernameInput.value.trim()) {
       usernameError.classList.remove('hidden');
       valid = false;
     }

     // Validate password
     if (!passwordInput.value || passwordInput.value.length < 6) {
       passwordError.classList.remove('hidden');
       valid = false;
     }

     if (!valid) return;

     // Simulate credential validation (replace with real API call)
     const username = usernameInput.value.trim();
     const password = passwordInput.value;

     // Example: simple hardcoded check (for demo only)
     if ((username === 'user@example.com' || username === 'user123') && password === 'password123') {
       alert('Login successful! Redirecting to your account...');
       // Redirect or load user dashboard here
       // window.location.href = '/dashboard.html';
     } else {
       alert('Invalid username/email or password.');
     }
   });
  </script>
 </body>
</html>
